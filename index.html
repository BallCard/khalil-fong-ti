<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #faf6f0;
      --panel: #ffffff;
      --text: #2e2b28;
      --muted: #7f7a74;
      --line: #e7e0d8;
      --soft: #f5f0e9;
      --accent: #b87c4e;
      --accent-strong: #8b5e3c;
      --shadow: 0 16px 40px rgba(80, 50, 30, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #fdfaf7 0, #faf6f0 36%, #f5efe8 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 32px;
      margin-top: 20px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "♪";
      position: absolute;
      right: 20px;
      top: 20px;
      font-size: 80px;
      opacity: 0.15;
      pointer-events: none;
      transform: rotate(15deg);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--accent-strong);
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 20px;
    }

    h1, h2, h3, p { margin: 0; }
    .hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.15;
      letter-spacing: -0.02em;
      max-width: 680px;
    }

    .hero .sub {
      margin-top: 16px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      max-width: 720px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    .intro-meta {
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      padding-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      font: inherit;
    }

    button:hover { transform: translateY(-2px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .btn-primary {
      background: var(--accent-strong);
      color: #fff;
      padding: 14px 24px;
      border-radius: 40px;
      box-shadow: 0 8px 20px rgba(139, 94, 60, 0.2);
      font-weight: 600;
      font-size: 15px;
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent-strong);
      padding: 14px 24px;
      border-radius: 40px;
      border: 1px solid var(--line);
      font-weight: 600;
      font-size: 15px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .test-wrap {
      margin-top: 22px;
      padding: 24px;
    }

    /* 进度条区域固定置顶 */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--panel);
      padding: 12px 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .progress {
      flex: 1;
      min-width: 240px;
      height: 8px;
      background: #ede6df;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #c99b7a, #8b5e3c);
      border-radius: inherit;
      transition: width .22s ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .question-list {
      display: grid;
      gap: 20px;
    }

    .question {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      background: linear-gradient(180deg, #ffffff, #fcfaf7);
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 12px;
      background: var(--soft);
      border: 1px solid var(--line);
      font-size: 12px;
    }

    .question-title {
      font-size: 16px;
      line-height: 1.6;
      font-weight: 500;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      transition: border-color .16s ease, background .16s ease;
    }

    .option:hover {
      border-color: #c9b09a;
      background: #fcf8f4;
    }

    .option input {
      margin-top: 3px;
      accent-color: var(--accent-strong);
      transform: scale(1.1);
      flex-shrink: 0;
    }

    .option-code {
      font-weight: 700;
      color: var(--accent-strong);
      min-width: 22px;
    }

    .actions-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
      padding-top: 8px;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
    }

    .result-wrap {
      margin-top: 22px;
      padding: 24px;
    }

    .result-layout {
      display: grid;
      gap: 20px;
    }

    .result-top {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 20px;
      align-items: stretch;
    }

    .poster-box, .type-box, .analysis-box, .dim-box, .playlist-box {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      background: linear-gradient(180deg, #ffffff, #fcfaf7);
    }

    .poster-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 260px;
      position: relative;
      overflow: hidden;
    }

    .poster-image {
      width: 100%;
      max-width: 220px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      background: #f5f0e9;
      object-fit: cover;
      aspect-ratio: 1/1;
    }

    .poster-caption {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .type-kicker {
      font-size: 13px;
      color: var(--accent-strong);
      margin-bottom: 8px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .type-name {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .type-subname {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 16px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 600;
      font-size: 14px;
    }

    .analysis-box h3, .dim-box h3, .playlist-box h3 {
      font-size: 17px;
      margin-bottom: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .analysis-box p {
      margin: 0;
      color: #3a3530;
      font-size: 15px;
      line-height: 1.8;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 4px;
    }

    .tag {
      background: var(--soft);
      border: 1px solid var(--line);
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--accent-strong);
    }

    .dim-list {
      display: grid;
      gap: 14px;
    }

    .dim-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      background: #fff;
    }

    .dim-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .dim-item-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .dim-item-score {
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }

    .dim-item p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #ede6df;
      border-radius: 999px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-strong);
      border-radius: inherit;
    }

    .playlist-box ul {
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .playlist-box li {
      padding: 8px 0;
      border-bottom: 1px dashed var(--line);
      color: var(--text);
      font-size: 14px;
    }

    .playlist-box li:last-child {
      border-bottom: none;
    }

    .result-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .lyric-quote {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--soft);
      border-radius: 16px;
      color: var(--accent-strong);
      font-style: italic;
      border-left: 3px solid var(--accent);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 800px) {
      .result-top { grid-template-columns: 1fr; }
      .hero { padding: 24px; }
    }

    @media (max-width: 600px) {
      .shell { padding: 14px 12px 42px; }
      .hero, .test-wrap, .result-wrap { padding: 18px; }
      .hero h1 { font-size: 30px; }
      .btn-primary, .btn-secondary { min-height: 44px; }
      .hero-actions .btn-primary { width: 100%; min-height: 44px; }
      .intro-meta { flex-direction: column; align-items: flex-start; }
      .topbar { position: static; top: auto; padding: 4px 0 10px; }
      .question { padding: 16px; }
      .question-title { font-size: 15px; line-height: 1.5; }
      .option { padding: 10px 12px; gap: 10px; }
      .option input { transform: scale(1.25); margin-top: 2px; }
      .actions-bottom > div:last-child { width: 100%; }
      .actions-bottom > div:last-child button { flex: 1 1 calc(50% - 6px); min-height: 44px; padding: 12px 14px; }
      .type-name { font-size: clamp(24px, 8vw, 32px); }
      .match { font-size: 13px; line-height: 1.4; }
      .result-actions > div { width: 100%; }
      .result-actions > div button { flex: 1 1 100%; min-height: 44px; padding: 12px 14px; }
    }

    .footer-note {
      margin-top: 24px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      line-height: 1.6;
    }

    .hidden {
      display: none !important;
    }

    /* 截图预览关闭按钮样式 */
    .preview-close-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 100000;
    }
    .preview-close-btn:hover {
      background: rgba(0,0,0,0.7);
    }

    .snapshot-actions {
      margin-top: 12px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .snapshot-actions button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      min-height: 40px;
      font-size: 14px;
      cursor: pointer;
    }

    .snapshot-save-btn {
      background: #d48c5b;
      color: #fff;
      font-weight: 600;
    }

    .snapshot-open-btn {
      background: rgba(255,255,255,0.2);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35) !important;
    }
  </style>

      function updateProgress() {
        const total = currentVisible.length;
        const done = currentVisible.filter(q => answers[q.id] !== undefined).length;
        const percent = total ? (done / total) * 100 : 0;
        progressBar.style.width = `${percent}%`;
        progressText.textContent = `${done} / ${total}`;
        const complete = done === total;
        submitBtn.disabled = !complete;
        testHint.textContent = complete ? '🎉 你已完成所有题目，点击揭晓你的 TI 章节。' : '每一道选择，都是一次节奏自检。';
      }

      function computeMatch() {
        const scores = ALBUMS.map(album => {
          let totalScore = 0;
          const albumWeights = WEIGHTS[album.code] || {};
          for (let i = 1; i <= 16; i++) {
            const qId = `q${i}`;
            const ans = answers[qId];
            if (ans) {
              const qWeights = albumWeights[qId] || [1,2,3];
              totalScore += qWeights[ans - 1] || 2;
            }
          }
          return { ...album, rawScore: totalScore };
        });
        scores.sort((a, b) => b.rawScore - a.rawScore);
        const best = scores[0];
        const second = scores[1] || best;
        const questionCount = Math.max(1, currentVisible.length);
        const minScore = questionCount;
        const maxScore = questionCount * 3;
        const normalized = (best.rawScore - minScore) / Math.max(1, (maxScore - minScore));
        const similarity = Math.max(0, Math.min(100, Math.round(normalized * 100)));
        const gap = Math.max(0, best.rawScore - second.rawScore);
        const confidence = Math.max(0, Math.min(100, Math.round((gap / questionCount) * 100)));
        const confidenceLabel = confidence >= 60 ? "高" : confidence >= 30 ? "中" : "低";
        return { best, similarity, all: scores, confidence, confidenceLabel };
      }

          }
        };
        logDiag('init', `ua=${navigator.userAgent}; wechat=${isWeChat}`);
        const buildBadgeId = 'snapshotBuildBadge';
        if (!document.getElementById(buildBadgeId)) {
          const badge = document.createElement('div');
          badge.id = buildBadgeId;
          badge.style.cssText = 'position:fixed;right:10px;bottom:10px;z-index:99990;background:rgba(0,0,0,0.55);color:#fff;padding:2px 6px;border-radius:6px;font-size:10px;letter-spacing:.2px;';
          badge.textContent = BUILD_TAG;
          document.body.appendChild(badge);
        }
        const normalizeErrorCode = (err) => {
          const msg = `${err && err.message ? err.message : ''}`.toUpperCase();
          const name = `${err && err.name ? err.name : ''}`.toUpperCase();
          if (msg.includes('E_BLOB_MAJOR_LAYER_MISSING')) return 'E_BLOB_MAJOR_LAYER_MISSING';
          if (msg.includes('E_BLOB_TEXT_LAYER_MISSING')) return 'E_BLOB_TEXT_LAYER_MISSING';
          if (msg.includes('E_BLOB_VERIFY_FAILED')) return 'E_BLOB_VERIFY_FAILED';
          if (msg.includes('E_QR_TIMEOUT')) return 'E_QR_TIMEOUT';
          if (msg.includes('E_EXPORT_NULL')) return 'E_EXPORT_NULL';
          if (msg.includes('E_CANVAS_TAINTED') || name.includes('SECURITYERROR')) return 'E_CANVAS_TAINTED';
          return 'E_RENDER_FAIL';
        };

        if (typeof QRCode === 'undefined') {
          logDiag('fatal', 'E_QRCODE_LIB_MISSING');
          showDiagReport('截图诊断（失败）');
          alert(`分享组件加载失败（E_QRCODE_LIB_MISSING）[${BUILD_TAG}]`);
          finishCapture();
          return;
        }

        const cleanupExistingPreview = () => {
          document.querySelectorAll('.snapshot-preview-panel').forEach((panel) => {
            const oldUrl = panel.getAttribute('data-blob-url');
            if (oldUrl) URL.revokeObjectURL(oldUrl);
            safeRemove(panel);
          });
          document.querySelectorAll('.snapshot-image-only').forEach((imageOnly) => {
            const oldUrl = imageOnly.getAttribute('data-blob-url');
            if (oldUrl) URL.revokeObjectURL(oldUrl);
            safeRemove(imageOnly);
          });
          document.querySelectorAll('.snapshot-preview-overlay, .snapshot-loading-mask').forEach((n) => safeRemove(n));
        };
        cleanupExistingPreview();

        const loadingMask = document.createElement('div');
        loadingMask.className = 'snapshot-loading-mask';
        loadingMask.style.cssText = `
          position: fixed; left: 0; top: 0; width: 100%; height: 100%;
          background: rgba(0,0,0,0.35); z-index: 99997;
          display: flex; align-items: center; justify-content: center;
          color: #fff; font-size: 14px;
        `;
        loadingMask.textContent = '正在生成截图...';
        document.body.appendChild(loadingMask);

        const roundRect = (ctx, x, y, w, h, r, fill, stroke) => {
          const radius = Math.min(r, w / 2, h / 2);
          ctx.beginPath();
          ctx.moveTo(x + radius, y);
          ctx.arcTo(x + w, y, x + w, y + h, radius);
          ctx.arcTo(x + w, y + h, x, y + h, radius);
          ctx.arcTo(x, y + h, x, y, radius);
          ctx.arcTo(x, y, x + w, y, radius);
          ctx.closePath();
          if (fill) {
            ctx.fillStyle = fill;
            ctx.fill();
          }
          if (stroke) {
            ctx.strokeStyle = stroke;
            ctx.stroke();
          }
        };

        const loadImage = (src) => new Promise((resolve, reject) => {
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.referrerPolicy = 'no-referrer';
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });

        const wrapText = (ctx, text, x, y, maxWidth, lineHeight, maxLines) => {
          const chars = String(text || '').split('');
          const lines = [];
          let current = '';
          chars.forEach((ch) => {
            const test = current + ch;
            if (ctx.measureText(test).width > maxWidth && current) {
              lines.push(current);
              current = ch;
            } else {
              current = test;
            }
          });
          if (current) lines.push(current);
          const finalLines = typeof maxLines === 'number' ? lines.slice(0, maxLines) : lines;
          finalLines.forEach((line, i) => ctx.fillText(line, x, y + i * lineHeight));
          return finalLines.length;
        };

        const createQrCanvas = async () => {
          const holder = document.createElement('div');
          holder.style.cssText = 'position:fixed;left:0;top:0;width:220px;height:220px;opacity:0;pointer-events:none;z-index:1;';
          document.body.appendChild(holder);
          try {
            new QRCode(holder, {
              text: currentUrl,
              width: 220,
              height: 220,
              colorDark: '#2e2b28',
              colorLight: '#ffffff',
              correctLevel: QRCode.CorrectLevel.H
            });
            logDiag('qr', 'qrcode instance created');
            let qrCanvas = null;
            let qrImg = null;
            const start = Date.now();
            while (Date.now() - start < 2500) {
              qrCanvas = holder.querySelector('canvas');
              qrImg = holder.querySelector('img');
              if (qrCanvas || qrImg) break;
              await wait(50);
            }
            if (qrCanvas) return qrCanvas;
            if (qrImg) {
              logDiag('qr', 'fallback to img');
              const tmp = document.createElement('canvas');
              tmp.width = 220;
              tmp.height = 220;
              const tctx = tmp.getContext('2d');
              const img = await loadImage(qrImg.src);
              tctx.drawImage(img, 0, 0, 220, 220);
              return tmp;
            }
            throw new Error('E_QR_TIMEOUT');
          } finally {
            safeRemove(holder);
          }
        };

        (async () => {
          let imageUrl = '';
          try {
            if (document.fonts && document.fonts.ready) {
              await document.fonts.ready;
            }
            logDiag('fonts', 'ready');

            const canvas = document.createElement('canvas');
            const width = 1080;
            const height = 1460;
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            if (!ctx) throw new Error('Canvas 初始化失败');
            const stagePixels = {};
            const isLight = (p) => !!p && p[3] > 0 && p[0] > 238 && p[1] > 238 && p[2] > 238;
            const isDark = (p) => !!p && p[3] > 0 && p[0] < 70 && p[1] < 70 && p[2] < 70;
            const pixelSample = (x, y, name) => {
              try {
                const d = ctx.getImageData(x, y, 1, 1).data;
                stagePixels[name] = [d[0], d[1], d[2], d[3]];
                logDiag('pixel', `${name}=${d[0]},${d[1]},${d[2]},${d[3]}`);
              } catch (e) {
                logDiag('pixel_err', `${name}=${e.name || 'Error'}:${e.message || ''}`);
                throw new Error(`E_CANVAS_TAINTED:${e.name || 'Error'}`);
              }
            };

            ctx.fillStyle = '#f7f3ee';
            ctx.fillRect(0, 0, width, height);
            roundRect(ctx, 34, 34, width - 68, height - 68, 42, '#fdfaf7', '#e7d8c8');
            pixelSample(60, 60, 'bg');

            const cardX = 84;
            const coverY = 120;
            const coverSize = 190;
            roundRect(ctx, cardX, coverY, coverSize, coverSize, 24, '#f0e4d8', null);
            const skipRemoteCover = isWeChat || /[?&]safecover=1/.test(window.location.search);
            try {
              if (!skipRemoteCover) {
                const cover = await loadImage(album.cover);
                ctx.save();
                roundRect(ctx, cardX, coverY, coverSize, coverSize, 24);
                ctx.clip();
                ctx.drawImage(cover, cardX, coverY, coverSize, coverSize);
                ctx.restore();
                logDiag('cover', 'remote cover drawn');
              } else {
                throw new Error('SKIP_REMOTE_COVER');
              }
            } catch (e) {
              logDiag('cover_fallback', e.message || 'fallback');
              ctx.fillStyle = '#8b5e3c';
              ctx.font = 'bold 46px sans-serif';
              ctx.fillText('TI', cardX + 62, coverY + 114);
            }
            pixelSample(cardX + 90, coverY + 90, 'cover_region');

            const textX = cardX + coverSize + 34;
            ctx.fillStyle = '#b87c4e';
            ctx.font = '500 30px sans-serif';
            ctx.fillText(`${album.year} · TI 章节`, textX, coverY + 36);
            ctx.fillStyle = '#2e2b28';
            ctx.font = '700 66px sans-serif';
            wrapText(ctx, album.name, textX, coverY + 102, 580, 74, 2);
            pixelSample(textX + 18, coverY + 86, 'title_region');

            const badge = `匹配度 ${similarity}% · 置信度 ${confidence}%（${confidenceLabel}）`;
            ctx.font = '600 32px sans-serif';
            const badgeW = Math.min(ctx.measureText(badge).width + 56, width - textX - 68);
            roundRect(ctx, textX, coverY + 142, badgeW, 62, 31, '#f0e4d8', null);
            ctx.fillStyle = '#8b5e3c';
            ctx.fillText(badge, textX + 26, coverY + 184);

            roundRect(ctx, 84, 366, 912, 310, 28, '#ffffff', null);
            ctx.fillStyle = '#b87c4e';
            ctx.fillRect(84, 366, 7, 310);
            ctx.fillStyle = '#8b5e3c';
            ctx.font = '600 34px sans-serif';
            ctx.fillText('章节人格解读', 118, 422);
            ctx.fillStyle = '#3a3530';
            ctx.font = '400 32px sans-serif';
            wrapText(ctx, album.desc, 118, 474, 840, 48, 4);
            pixelSample(160, 492, 'desc_region');

            roundRect(ctx, 84, 710, 912, 114, 24, '#f7f1ea', null);
            ctx.fillStyle = '#7f7a74';
            ctx.font = 'italic 30px sans-serif';
            wrapText(ctx, `“ ${album.lyric} ”`, 116, 778, 840, 44, 2);

            const tags = (album.tags || []).slice(0, 4);
            let tagX = 84;
            const tagY = 868;
            ctx.font = '500 28px sans-serif';
            tags.forEach((tag) => {
              const text = `#${tag}`;
              const tw = ctx.measureText(text).width;
              const pillW = tw + 40;
              roundRect(ctx, tagX, tagY, pillW, 52, 26, '#ede6df', null);
              ctx.fillStyle = '#8b5e3c';
              ctx.fillText(text, tagX + 20, tagY + 35);
              tagX += pillW + 12;
            });

            const qrCanvas = await createQrCanvas();
            roundRect(ctx, 838, 826, 158, 158, 16, '#ffffff', null);
            ctx.drawImage(qrCanvas, 848, 836, 138, 138);
            pixelSample(905, 894, 'qr_region');

            ctx.fillStyle = '#8f8a84';
            ctx.font = '500 28px sans-serif';
            ctx.fillText('扫码测试 · 匹配你的 TI 章节', 664, 1038);
            ctx.fillStyle = '#6c655f';
            ctx.font = '400 20px monospace';
            ctx.fillText(BUILD_TAG, 88, 1376);
            pixelSample(130, 1370, 'build_tag');

            const imgBlob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png', 1));
            if (!imgBlob) throw new Error('E_EXPORT_NULL');
            imageUrl = URL.createObjectURL(imgBlob);
            logDiag('export', `blob=${imgBlob.size}`);
            try {
              const verifyCanvas = document.createElement('canvas');
              verifyCanvas.width = width;
              verifyCanvas.height = height;
              const vctx = verifyCanvas.getContext('2d', { willReadFrequently: true });
              if (!vctx) throw new Error('E_BLOB_VERIFY_FAILED');
              const vimg = await loadImage(imageUrl);
              vctx.drawImage(vimg, 0, 0, width, height);
              const sampleRegion = (x, y, name, radius = 2) => {
                let total = 0;
                let dark = 0;
                let light = 0;
                for (let dx = -radius; dx <= radius; dx += 1) {
                  for (let dy = -radius; dy <= radius; dy += 1) {
                    const d = vctx.getImageData(x + dx, y + dy, 1, 1).data;
                    const p = [d[0], d[1], d[2], d[3]];
                    total += 1;
                    if (isDark(p)) dark += 1;
                    if (isLight(p)) light += 1;
                  }
                }
                const result = { darkRatio: dark / total, lightRatio: light / total };
                logDiag('blob_region', `${name}=dark:${result.darkRatio.toFixed(2)},light:${result.lightRatio.toFixed(2)}`);
                return result;
              };
              const blobPixels = {
                cover_region: sampleRegion(cardX + 90, coverY + 90, 'cover_region'),
                title_region: sampleRegion(textX + 18, coverY + 86, 'title_region'),
                desc_region: sampleRegion(160, 492, 'desc_region'),
                desc_region_2: sampleRegion(210, 540, 'desc_region_2'),
                qr_region: sampleRegion(905, 894, 'qr_region'),
                build_tag: sampleRegion(130, 1370, 'build_tag'),
                build_tag_2: sampleRegion(230, 1370, 'build_tag_2')
              };
              const descMissing = blobPixels.desc_region.lightRatio > 0.8 && blobPixels.desc_region_2.lightRatio > 0.8;
              const buildMissing = blobPixels.build_tag.lightRatio > 0.8 && blobPixels.build_tag_2.lightRatio > 0.8;
              const textMissing = blobPixels.title_region.lightRatio > 0.8 && descMissing && buildMissing;
              const qrPresent = blobPixels.qr_region.darkRatio > 0.2;
              const majorMissing = blobPixels.title_region.lightRatio > 0.9 && descMissing && blobPixels.qr_region.lightRatio > 0.9 && buildMissing;
              if (majorMissing) {
                logDiag('anomaly', 'E_BLOB_MAJOR_LAYER_MISSING');
                throw new Error('E_BLOB_MAJOR_LAYER_MISSING');
              }
              if (textMissing && qrPresent) {
                logDiag('anomaly', 'E_BLOB_TEXT_LAYER_MISSING');
                throw new Error('E_BLOB_TEXT_LAYER_MISSING');
              }
              logDiag('anomaly', 'none');
            } catch (e) {
              if (String(e.message || '').includes('E_BLOB_TEXT_LAYER_MISSING') || String(e.message || '').includes('E_BLOB_MAJOR_LAYER_MISSING')) throw e;
              logDiag('blob_verify_err', `${e.name || 'Error'}:${e.message || ''}`);
              throw new Error('E_BLOB_VERIFY_FAILED');
            }

            safeRemove(loadingMask);

            const openImageOnlyMode = () => {
              const imageOnly = document.createElement('div');
              imageOnly.className = 'snapshot-image-only';
              imageOnly.setAttribute('data-blob-url', imageUrl);
              imageOnly.style.cssText = `
                position: fixed; left: 0; top: 0; width: 100%; height: 100%;
                background: rgba(0,0,0,0.85); z-index: 100001;
                display: flex; flex-direction: column; align-items: center; justify-content: center;
                padding: 20px; box-sizing: border-box;
              `;
              imageOnly.innerHTML = `
                <img src="${imageUrl}" alt="原图" style="max-width:100%;max-height:78vh;border-radius:14px;display:block;">
                <div style="margin-top:10px;color:#fff;font-size:13px;text-align:center;">长按图片保存，点空白处返回</div>
              `;
              imageOnly.onclick = () => {
                const oldUrl = imageOnly.getAttribute('data-blob-url');
                if (oldUrl) URL.revokeObjectURL(oldUrl);
                safeRemove(imageOnly);
              };
              document.body.appendChild(imageOnly);
            };

            if (isWeChat) {
              logDiag('save_branch', 'wechat-auto-open-image');
              openImageOnlyMode();
              if (SHOW_SUCCESS_DIAG) showDiagReport('截图诊断（成功）');
              finishCapture();
              return;
            }

            const overlay = document.createElement('div');
            overlay.className = 'snapshot-preview-overlay';
            overlay.style.cssText = `
              position: fixed; left: 0; top: 0; width: 100%; height: 100%;
              background: rgba(0,0,0,0.35);
              z-index: 99998;
            `;
            document.body.appendChild(overlay);

            const preview = document.createElement('div');
            preview.className = 'snapshot-preview-panel';
            preview.style.cssText = `
              position: fixed;
              left: 50%; top: 50%;
              transform: translate(-50%, -50%);
              width: min(92vw, 600px);
              z-index: 99999;
            `;

            preview.setAttribute('data-blob-url', imageUrl);

            const img = document.createElement('img');
            img.alt = '分享截图';
            img.src = imageUrl;
            img.style.cssText = 'width:100%;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.25);display:block;';
            preview.appendChild(img);

            const tip = document.createElement('div');
            tip.style.cssText = 'text-align:center;margin-top:12px;color:#fff;font-size:14px;';
            tip.textContent = '可直接保存；若失败请点“打开原图”后长按保存';
            preview.appendChild(tip);

            const actions = document.createElement('div');
            actions.className = 'snapshot-actions';

            const saveBtn = document.createElement('button');
            saveBtn.className = 'snapshot-save-btn';
            saveBtn.textContent = '保存图片';
            saveBtn.onclick = async () => {
              const shareCap = !!navigator.share;
              const canShareCap = !!navigator.canShare;
              const fileCap = !!window.File;
              logDiag('save_cap', `share=${shareCap};canShare=${canShareCap};file=${fileCap}`);
              if (isWeChat) {
                logDiag('save_branch', 'wechat-open-image');
                openBtn.click();
                return;
              }
              const filename = `khalil-fong-ti-${Date.now()}.png`;
              try {
                if (navigator.share && window.File && navigator.canShare) {
                  const file = new File([imgBlob], filename, { type: 'image/png' });
                  if (navigator.canShare({ files: [file] })) {
                    logDiag('save_branch', 'native-share');
                    await navigator.share({ files: [file], title: 'Khalil Fong TI' });
                    return;
                  }
                }
              } catch (err) {
                logDiag('save_share_error', `${err.name || 'Error'}:${err.message || ''}`);
                console.warn('系统分享失败，回退到下载: ', err);
              }

              try {
                logDiag('save_branch', 'a-download');
                const link = document.createElement('a');
                link.href = imageUrl;
                link.download = filename;
                link.rel = 'noopener';
                document.body.appendChild(link);
                link.click();
                safeRemove(link);
              } catch (err) {
                logDiag('save_download_error', `${err.name || 'Error'}:${err.message || ''}`);
                console.warn('下载失败: ', err);
                alert('当前环境不支持直接保存，请点“打开原图”后长按保存。');
              }
            };
            actions.appendChild(saveBtn);

            const openBtn = document.createElement('button');
            openBtn.className = 'snapshot-open-btn';
            openBtn.textContent = '长按保存模式';
            openBtn.onclick = () => {
              openImageOnlyMode();
            };
            actions.appendChild(openBtn);
            preview.appendChild(actions);

            const closeBtn = document.createElement('button');
            closeBtn.className = 'preview-close-btn';
            closeBtn.innerHTML = '&times;';
            closeBtn.setAttribute('aria-label', '关闭');
            const closePreview = () => {
              URL.revokeObjectURL(imageUrl);
              safeRemove(preview);
              safeRemove(overlay);
              finishCapture();
            };
            closeBtn.onclick = closePreview;
            overlay.onclick = closePreview;
            preview.appendChild(closeBtn);
            document.body.appendChild(preview);
            if (SHOW_SUCCESS_DIAG) showDiagReport('截图诊断（成功）');
            finishCapture();
          } catch (err) {
            if (imageUrl) URL.revokeObjectURL(imageUrl);
            const errCode = normalizeErrorCode(err);
            console.warn('截图失败: ', errCode, err);
            logDiag('fatal', `${errCode}:${err && err.message ? err.message : ''}`);
            showDiagReport('截图诊断（失败）');
            alert(`截图生成失败（${errCode}）[${BUILD_TAG}]。${DIAG_MODE ? '请截图底部诊断面板发我。' : '可加 ?diag=1 后重试。'}`);
            safeRemove(loadingMask);
            finishCapture();
          }
        })();
      }

      function startTest() {
        answers = {};
        currentVisible = questions;
        renderQuestions();
        showScreen('test');
      }

      // 绑定事件
      document.getElementById('startBtn').addEventListener('click', startTest);
      document.getElementById('backIntroBtn').addEventListener('click', () => showScreen('intro'));
      document.getElementById('submitBtn').addEventListener('click', renderResult);
      document.getElementById('restartBtn').addEventListener('click', startTest);
      document.getElementById('toTopBtn').addEventListener('click', () => showScreen('intro'));
      
      let isCapturing = false;
      document.getElementById('shareSnapshotBtn').addEventListener('click', () => {
        if (isCapturing) return;
        isCapturing = true;
        generateShareSnapshot(() => {
          isCapturing = false;
        });
      });

      // 初始化
      validateAlbumData();
      renderQuestions();
    })();
  </script>
</body>
</html>
