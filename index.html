<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方大同 TI 专辑匹配 · 你的灵魂会落在哪一段 Groove</title>
  
  <!-- 截图库（稳定 CDN） -->
  <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <!-- 二维码生成库 -->
  <script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    :root {
      --bg: #faf6f0;
      --panel: #ffffff;
      --text: #2e2b28;
      --muted: #7f7a74;
      --line: #e7e0d8;
      --soft: #f5f0e9;
      --accent: #b87c4e;
      --accent-strong: #8b5e3c;
      --shadow: 0 16px 40px rgba(80, 50, 30, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #fdfaf7 0, #faf6f0 36%, #f5efe8 100%);
      color: var(--text);
      min-height: 100vh;
    }

    .shell {
      max-width: 1000px;
      margin: 0 auto;
      padding: 24px 16px 56px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 32px;
      margin-top: 20px;
      overflow: hidden;
      position: relative;
    }

    .hero::after {
      content: "♪";
      position: absolute;
      right: 20px;
      top: 20px;
      font-size: 80px;
      opacity: 0.15;
      pointer-events: none;
      transform: rotate(15deg);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--accent-strong);
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 999px;
      padding: 6px 14px;
      margin-bottom: 20px;
    }

    h1, h2, h3, p { margin: 0; }
    .hero h1 {
      font-size: clamp(28px, 5vw, 48px);
      line-height: 1.15;
      letter-spacing: -0.02em;
      max-width: 680px;
    }

    .hero .sub {
      margin-top: 16px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      max-width: 720px;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 28px;
    }

    .intro-meta {
      margin-top: 28px;
      font-size: 13px;
      color: var(--muted);
      border-top: 1px solid var(--line);
      padding-top: 16px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      font: inherit;
    }

    button:hover { transform: translateY(-2px); }
    button:disabled { cursor: not-allowed; opacity: 0.55; transform: none; }

    .btn-primary {
      background: var(--accent-strong);
      color: #fff;
      padding: 14px 24px;
      border-radius: 40px;
      box-shadow: 0 8px 20px rgba(139, 94, 60, 0.2);
      font-weight: 600;
      font-size: 15px;
    }

    .btn-secondary {
      background: #fff;
      color: var(--accent-strong);
      padding: 14px 24px;
      border-radius: 40px;
      border: 1px solid var(--line);
      font-weight: 600;
      font-size: 15px;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .test-wrap {
      margin-top: 22px;
      padding: 24px;
    }

    /* 进度条区域固定置顶 */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: var(--panel);
      padding: 12px 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .progress {
      flex: 1;
      min-width: 240px;
      height: 8px;
      background: #ede6df;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #c99b7a, #8b5e3c);
      border-radius: inherit;
      transition: width .22s ease;
    }

    .progress-text {
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .question-list {
      display: grid;
      gap: 20px;
    }

    .question {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      background: linear-gradient(180deg, #ffffff, #fcfaf7);
    }

    .question-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border-radius: 999px;
      padding: 4px 12px;
      background: var(--soft);
      border: 1px solid var(--line);
      font-size: 12px;
    }

    .question-title {
      font-size: 16px;
      line-height: 1.6;
      font-weight: 500;
    }

    .options {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
      transition: border-color .16s ease, background .16s ease;
    }

    .option:hover {
      border-color: #c9b09a;
      background: #fcf8f4;
    }

    .option input {
      margin-top: 3px;
      accent-color: var(--accent-strong);
      transform: scale(1.1);
      flex-shrink: 0;
    }

    .option-code {
      font-weight: 700;
      color: var(--accent-strong);
      min-width: 22px;
    }

    .actions-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
      padding-top: 8px;
    }

    .hint {
      color: var(--muted);
      font-size: 14px;
    }

    .result-wrap {
      margin-top: 22px;
      padding: 24px;
    }

    .result-layout {
      display: grid;
      gap: 20px;
    }

    .result-top {
      display: grid;
      grid-template-columns: 0.9fr 1.1fr;
      gap: 20px;
      align-items: stretch;
    }

    .poster-box, .type-box, .analysis-box, .dim-box, .playlist-box {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px;
      background: linear-gradient(180deg, #ffffff, #fcfaf7);
    }

    .poster-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 260px;
      position: relative;
      overflow: hidden;
    }

    .poster-image {
      width: 100%;
      max-width: 220px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      background: #f5f0e9;
      object-fit: cover;
      aspect-ratio: 1/1;
    }

    .poster-caption {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .type-kicker {
      font-size: 13px;
      color: var(--accent-strong);
      margin-bottom: 8px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .type-name {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .type-subname {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    .match {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 16px;
      background: var(--soft);
      border: 1px solid var(--line);
      color: var(--accent-strong);
      font-weight: 600;
      font-size: 14px;
    }

    .analysis-box h3, .dim-box h3, .playlist-box h3 {
      font-size: 17px;
      margin-bottom: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .analysis-box p {
      margin: 0;
      color: #3a3530;
      font-size: 15px;
      line-height: 1.8;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 12px 0 4px;
    }

    .tag {
      background: var(--soft);
      border: 1px solid var(--line);
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 12px;
      color: var(--accent-strong);
    }

    .dim-list {
      display: grid;
      gap: 14px;
    }

    .dim-item {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      background: #fff;
    }

    .dim-item-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 8px;
    }

    .dim-item-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .dim-item-score {
      color: var(--accent-strong);
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
    }

    .dim-item p {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #ede6df;
      border-radius: 999px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent-strong);
      border-radius: inherit;
    }

    .playlist-box ul {
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .playlist-box li {
      padding: 8px 0;
      border-bottom: 1px dashed var(--line);
      color: var(--text);
      font-size: 14px;
    }

    .playlist-box li:last-child {
      border-bottom: none;
    }

    .result-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .lyric-quote {
      margin-top: 14px;
      padding: 12px 16px;
      background: var(--soft);
      border-radius: 16px;
      color: var(--accent-strong);
      font-style: italic;
      border-left: 3px solid var(--accent);
      font-size: 14px;
      line-height: 1.6;
    }

    @media (max-width: 800px) {
      .result-top { grid-template-columns: 1fr; }
      .hero { padding: 24px; }
    }

    @media (max-width: 600px) {
      .shell { padding: 14px 12px 42px; }
      .hero, .test-wrap, .result-wrap { padding: 18px; }
      .hero h1 { font-size: 30px; }
      .btn-primary, .btn-secondary { min-height: 44px; }
      .hero-actions .btn-primary { width: 100%; min-height: 44px; }
      .intro-meta { flex-direction: column; align-items: flex-start; }
      .topbar { position: static; top: auto; padding: 4px 0 10px; }
      .question { padding: 16px; }
      .question-title { font-size: 15px; line-height: 1.5; }
      .option { padding: 10px 12px; gap: 10px; }
      .option input { transform: scale(1.25); margin-top: 2px; }
      .actions-bottom > div:last-child { width: 100%; }
      .actions-bottom > div:last-child button { flex: 1 1 calc(50% - 6px); min-height: 44px; padding: 12px 14px; }
      .type-name { font-size: clamp(24px, 8vw, 32px); }
      .match { font-size: 13px; line-height: 1.4; }
      .result-actions > div { width: 100%; }
      .result-actions > div button { flex: 1 1 100%; min-height: 44px; padding: 12px 14px; }
    }

    .footer-note {
      margin-top: 24px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
      line-height: 1.6;
    }

    .hidden {
      display: none !important;
    }

    /* 截图预览关闭按钮样式 */
    .preview-close-btn {
      position: absolute;
      top: 8px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      border-radius: 50%;
      width: 44px;
      height: 44px;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      z-index: 100000;
    }
    .preview-close-btn:hover {
      background: rgba(0,0,0,0.7);
    }
  </style>

</head>

          </div>

            <div id="dimList" class="dim-list"></div>
          </div>

          <div class="playlist-box">
            <h3>🎧 专属推荐歌单</h3>
            <ul id="playlist"></ul>
          </div>
        </div>

        <div class="result-actions">
          <div style="display:flex; gap:12px; flex-wrap:wrap;">
            <button id="restartBtn" class="btn-secondary">🔄 重新测试</button>
            <button id="toTopBtn" class="btn-primary">🏠 回到首页</button>
            <button id="shareSnapshotBtn" class="btn-primary" style="background: #d48c5b;">📸 分享截图</button>

        </div>
        <div class="footer-note">

        </div>
      </div>
    </section>
  </div>

      function updateProgress() {
        const total = currentVisible.length;
        const done = currentVisible.filter(q => answers[q.id] !== undefined).length;
        const percent = total ? (done / total) * 100 : 0;
        progressBar.style.width = `${percent}%`;
        progressText.textContent = `${done} / ${total}`;
        const complete = done === total;
        submitBtn.disabled = !complete;
        testHint.textContent = complete ? '🎉 你已完成所有题目，点击揭晓你的 TI 章节。' : '每一道选择，都是一次节奏自检。';
      }

      function computeMatch() {
        const scores = ALBUMS.map(album => {
          let totalScore = 0;
          const albumWeights = WEIGHTS[album.code] || {};
          for (let i = 1; i <= 16; i++) {
            const qId = `q${i}`;
            const ans = answers[qId];
            if (ans) {
              const qWeights = albumWeights[qId] || [1,2,3];
              totalScore += qWeights[ans - 1] || 2;
            }
          }
          return { ...album, rawScore: totalScore };
        });
        scores.sort((a, b) => b.rawScore - a.rawScore);
        const best = scores[0];
        const second = scores[1] || best;
        const questionCount = Math.max(1, currentVisible.length);
        const minScore = questionCount;
        const maxScore = questionCount * 3;
        const normalized = (best.rawScore - minScore) / Math.max(1, (maxScore - minScore));
        const similarity = Math.max(0, Math.min(100, Math.round(normalized * 100)));
        const gap = Math.max(0, best.rawScore - second.rawScore);
        const confidence = Math.max(0, Math.min(100, Math.round((gap / questionCount) * 100)));
        const confidenceLabel = confidence >= 60 ? "高" : confidence >= 30 ? "中" : "低";
        return { best, similarity, all: scores, confidence, confidenceLabel };
      }

          <div style="background:#fff;border-radius:20px;padding:18px;margin-bottom:16px;border-left:4px solid #b87c4e;">
            <div style="font-size:15px;font-weight:600;color:#8b5e3c;margin-bottom:8px;">章节人格解读</div>
            <p style="font-size:14px;line-height:1.65;color:#3a3530;margin:0;">${album.desc}</p>
          </div>

          <div style="background:#faf7f3;border-radius:16px;padding:14px;margin-bottom:20px;">
            <p style="font-size:14px;color:#7f7a74;margin:0;font-style:italic;">“ ${album.lyric} ”</p>
          </div>

          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
            <div style="display:flex;gap:8px;flex-wrap:wrap;flex:1;">
              ${album.tags.map(t => `<span style="background:#ede6df;padding:4px 14px;border-radius:40px;font-size:13px;color:#8b5e3c;">#${t}</span>`).join('')}
            </div>
            <div id="qrcodeContainer" style="width:80px;height:80px;border-radius:8px;overflow:hidden;background:#fff;flex-shrink:0;"></div>
          </div>
          <div style="text-align:right;margin-top:12px;font-size:12px;color:#8f8a84;">扫码测试 · 匹配你的 TI 章节</div>
        `;
        document.body.appendChild(captureNode);

        const qrcodeEl = captureNode.querySelector('#qrcodeContainer');
        try {
          new QRCode(qrcodeEl, {
            text: currentUrl,
            width: 80,
            height: 80,
            colorDark: "#2e2b28",
            colorLight: "#ffffff",
            correctLevel: QRCode.CorrectLevel.H
          });
        } catch (err) {
          console.warn('二维码生成失败: ', err);
          alert('二维码生成失败，请稍后重试。');
          safeRemove(captureNode);
          finishCapture();
          return;
        }

        const doCapture = async () => {
          if (captureDone || captureStarted) return;
          captureStarted = true;
          try {
            if (document.fonts && document.fonts.ready) {
              await document.fonts.ready;
            }
            await wait(120);
            await new Promise((r) => requestAnimationFrame(() => requestAnimationFrame(r)));

            const canvas = await html2canvas(captureNode, {
              scale: Math.min(3, (window.devicePixelRatio || 2)),
              backgroundColor: '#fdfaf7',
              useCORS: true,
              allowTaint: false,
              logging: false,
              foreignObjectRendering: false,
              scrollX: 0,
              scrollY: 0,
              windowWidth: 600
            });

            safeRemove(captureNode);

            const overlay = document.createElement('div');
            overlay.style.cssText = `
              position: fixed; left: 0; top: 0; width: 100%; height: 100%;
              background: rgba(0,0,0,0.35);
              z-index: 99998;
            `;
            document.body.appendChild(overlay);

            const preview = document.createElement('div');
            preview.style.cssText = `
              position: fixed;
              left: 50%; top: 50%;
              transform: translate(-50%, -50%);
              width: min(92vw, 600px);
              z-index: 99999;
            `;
            preview.innerHTML = `
              <img src="${canvas.toDataURL('image/png')}" alt="分享截图" style="width:100%;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,0.25);display:block;">
              <div style="text-align:center;margin-top:12px;color:#fff;font-size:14px;">长按图片即可保存到相册</div>
            `;

            const closeBtn = document.createElement('button');
            closeBtn.className = 'preview-close-btn';
            closeBtn.innerHTML = '&times;';
            closeBtn.setAttribute('aria-label', '关闭');
            closeBtn.onclick = () => {
              safeRemove(preview);
              safeRemove(overlay);
              finishCapture();
            };
            preview.appendChild(closeBtn);
            document.body.appendChild(preview);
            finishCapture();
          } catch (err) {
            console.warn('截图失败: ', err);
            alert('截图生成失败，可稍后重试。');
            safeRemove(captureNode);
            finishCapture();
          }
        };

        const imgElement = captureNode.querySelector('#shareCoverImage');
        if (imgElement && imgElement.complete && imgElement.naturalHeight > 0) {
          doCapture();
        } else if (imgElement) {
          imgElement.onload = doCapture;
          imgElement.onerror = doCapture;
          setTimeout(doCapture, 2000);
        } else {
          doCapture();
        }
      }

      function startTest() {
        answers = {};
        currentVisible = questions;
        renderQuestions();
        showScreen('test');
      }

      // 绑定事件
      document.getElementById('startBtn').addEventListener('click', startTest);
      document.getElementById('backIntroBtn').addEventListener('click', () => showScreen('intro'));
      document.getElementById('submitBtn').addEventListener('click', renderResult);
      document.getElementById('restartBtn').addEventListener('click', startTest);
      document.getElementById('toTopBtn').addEventListener('click', () => showScreen('intro'));
      
      let isCapturing = false;
      document.getElementById('shareSnapshotBtn').addEventListener('click', () => {
        if (isCapturing) return;
        isCapturing = true;
        generateShareSnapshot(() => {
          isCapturing = false;
        });
      });

      // 初始化
      validateAlbumData();
      renderQuestions();
    })();
  </script>
</body>
</html>
